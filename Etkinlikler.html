<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parlayan Yıldızlar AI - Yönetim Paneli</title>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --bg-dark: #0a0c10;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #05070a, #0c1017);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka Plan Efektleri */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-blue);
            filter: blur(150px);
            top: 10%;
            left: 10%;
            opacity: 0.2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-cyan);
            filter: blur(150px);
            bottom: 10%;
            right: 10%;
            opacity: 0.15;
            pointer-events: none;
        }

        /* Glassmorphism Panel Konteyneri */
        .panel-container {
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #8a99ad;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Durum Göstergesi */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            margin-bottom: 25px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: pulse 2s infinite;
        }

        /* Aksiyon Butonları */
        .btn {
            position: relative;
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-cyan));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
            margin-bottom: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        /* Terminal Çıktı Alanı */
        .terminal-log {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #00ff66;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
            margin-top: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <div class="status-badge">
            <span class="status-dot"></span>
            <span id="connection-status">Supabase Başlatılıyor...</span>
        </div>

        <h1>Parlayan Yıldızlar AI</h1>
        <p class="subtitle">Sistem ve Veritabanı Yönetim Merkezi</p>

        <!-- Ana Fonksiyon Tetikleyici -->
        <button class="btn" onclick="panelGirisYap()">Sisteme Giriş Yap</button>
        
        <!-- Veri Test Butonu -->
        <button class="btn btn-secondary" onclick="testVerisiGonder()">Sistem Test Verisi Gönder</button>

        <!-- Bilgi Konsolu -->
        <div class="terminal-log" id="log-console">> Sistem hazır durumda.</div>
    </div>

    <script>
        // 1. Supabase Kimlik Bilgileri Entegrasyonu
        const SUPABASE_URL = "https://dkjpxbudkbiikwrmksmv.supabase.co";
        const SUPABASE_ANON_KEY = "Sb_publishable_h8DJpX7VWQA8oXJRA7NV3w_U-6fpTuf";
        
        // Sabit Yönlendirme Linki
        const REDIRECT_URL = "https://jarvis-panel-ten.vercel.app/jarvis-2.html";

        let supabase;

        // Konsol Güncelleme Yardımcısı
        function logYaz(mesaj) {
            const consoleEl = document.getElementById('log-console');
            consoleEl.innerHTML += `<br>> ${mesaj}`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // 2. Supabase İstemcisini Kusursuz Başlatma
        function supabaseBaslat() {
            try {
                if (typeof supabase === 'undefined') {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    document.getElementById('connection-status').innerText = "Supabase Bağlantısı Aktif";
                    logYaz("Supabase istemcisi başarıyla oluşturuldu.");
                }
            } catch (error) {
                document.getElementById('connection-status').innerText = "Bağlantı Hatası!";
                document.getElementById('connection-status').style.color = "#ff4a4a";
                logYaz("HATA: Supabase başlatılamadı -> " + error.message);
            }
        }

        // 3. Yönlendirme Fonksiyonu
        function panelGirisYap() {
            logYaz("Yönlendirme protokolü tetiklendi...");
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 800);
        }

        // 4. Veritabanına Test Verisi Gönderme Fonksiyonu
        async function testVerisiGonder() {
            logYaz("Veritabanına test sorgusu gönderiliyor...");
            try {
                // NOT: 'sistem_loglari' tablonuzun adıdır. Panelinizdeki mevcut tabloya göre değiştirebilirsiniz.
                const { data, error } = await supabase
                    .from('sistem_loglari') 
                    .insert([
                        { 
                            islem: 'Panel Erişimi', 
                            detay: 'Kullanıcı panele başarıyla bağlandı.',
                            tarih: new Date().toISOString()
                        }
                    ]);

                if (error) throw error;

                logYaz("Veri başarıyla Supabase'e işlendi!");
            } catch (error) {
                // Tablo adı henüz oluşturulmadıysa bile hatayı yakalayıp konsola yansıtır
                logYaz("Bilgi: " + error.message + " (Tablo yapılandırmanızı kontrol edin)");
            }
        }

        // Sayfa yüklendiğinde sistemi otomatik hazırla
        document.addEventListener("DOMContentLoaded", () => {
            supabaseBaslat();
        });
    </script>
</body>
</html>
