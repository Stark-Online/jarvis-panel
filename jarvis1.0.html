<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Core Interface</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #040814; 
            color: #8ae4ff; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Arka Plan Siber Grid Efekti */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        /* Üst Panel / Ark Reatörü Teması */
        header {
            background: rgba(10, 20, 42, 0.85); 
            padding: 15px 20px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #00f0ff; 
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .brand-zone { display: flex; align-items: center; gap: 15px; }

        /* Dönen Ark Reaktörü Logosu */
        .arc-reactor {
            width: 40px; height: 40px;
            border: 3px dashed #00f0ff;
            border-radius: 50%;
            box-shadow: 0 0 12px #00f0ff;
            animation: spin 6s linear infinite;
            position: relative;
        }
        .arc-reactor::after {
            content: ''; position: absolute;
            top: 25%; left: 25%; width: 50%; height: 50%;
            background: #00f0ff; border-radius: 50%;
            box-shadow: 0 0 10px #00f0ff;
        }

        header h1 { 
            font-size: 20px; 
            font-weight: bold;
            letter-spacing: 3px; 
            color: #00f0ff; 
            text-shadow: 0 0 10px rgba(0,240,255,0.6); 
        }
        
        .status-container { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #52a7cc; }
        .pulse-dot {
            width: 8px; height: 8px; background: #00f0ff; border-radius: 50%;
            box-shadow: 0 0 10px #00f0ff; animation: pulse 1.5s infinite;
        }

        /* Mesaj Alanı */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 25px; 
            display: flex; flex-direction: column; gap: 20px;
            z-index: 5;
            scroll-behavior: smooth;
        }

        /* Kaydırma Çubuğu Özelleştirme */
        #chat-container::-webkit-scrollbar { width: 5px; }
        #chat-container::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 10px; }

        .message { 
            max-width: 80%; padding: 15px 20px; border-radius: 4px; 
            line-height: 1.6; font-size: 14px; position: relative;
            animation: fadeIn 0.4s ease forwards;
        }

        /* Kullanıcı Mesaj Stili */
        .user { 
            background: rgba(26, 39, 76, 0.6); 
            color: #ffffff; 
            align-self: flex-end; 
            border-right: 3px solid #ff4a4a;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.3);
        }

        /* Jarvis Mesaj Stili */
        .jarvis { 
            background: rgba(11, 26, 51, 0.7); 
            color: #00f0ff; 
            align-self: flex-start; 
            border-left: 3px solid #00f0ff; 
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        /* Alt Giriş Paneli */
        #input-area { 
            background: rgba(11, 26, 51, 0.9); 
            padding: 20px; display: flex; gap: 15px; align-items: center;
            border-top: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        textarea { 
            flex: 1; background: #060d1f; border: 1px solid #1a3a5f; border-radius: 6px;
            color: #fff; padding: 14px; resize: none; height: 50px; font-size: 14px; outline: none;
            font-family: inherit; transition: 0.3s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        textarea:focus { border-color: #00f0ff; box-shadow: 0 0 12px rgba(0,240,255,0.25); }

        button { 
            background: transparent; color: #00f0ff; border: 1px solid #00f0ff; 
            padding: 0 25px; height: 50px; border-radius: 6px; font-weight: bold; 
            font-family: inherit; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover:not(:disabled) { background: #00f0ff; color: #040814; box-shadow: 0 0 20px #00f0ff; }
        button:disabled { border-color: #1a3a5f; color: #1a3a5f; cursor: not-allowed; }

        /* J.A.R.V.I.S. Düşünme/Yüklenme Efekti */
        .thinking-waves {
            display: flex; gap: 5px; align-items: center; height: 20px; margin-top: 5px;
        }
        .wave {
            width: 3px; height: 100%; background: #00f0ff;
            animation: bounce 1s ease-in-out infinite;
        }
        .wave:nth-child(2) { animation-delay: 0.2s; }
        .wave:nth-child(3) { animation-delay: 0.4s; }
        .wave:nth-child(4) { animation-delay: 0.6s; }

        /* --- ANIMASYON TANIMLARI --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }

    </style>
</head>
<body>

<header>
    <div class="brand-zone">
        <div class="arc-reactor"></div>
        <div>
            <h1>J.A.R.V.I.S.</h1>
            <div class="status-container">
                <div class="pulse-dot"></div>
                <span id="status-text">CORE ONLINE</span>
            </div>
        </div>
    </div>
</header>

<div id="chat-container">
    <div class="message jarvis" id="welcome-msg"></div>
</div>

<div id="input-area">
    <textarea id="user-input" placeholder="Sistem komutu veya mesaj girin..."></textarea>
    <button id="send-btn" onclick="mesajGonder()">İletişim</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusText = document.getElementById('status-text');

    // Sayfa yüklendiğinde havalı bir karşılama yazısı başlat
    window.onload = () => {
        typeWriter("Sistem verileri yüklendi. Sizin için hazırıyım efendim, bir istek belirtin.", "welcome-msg");
    };

    // Karakterleri Tek Tek Yazma Efekti (Typewriter)
    function typeWriter(text, elementId, speed = 25) {
        let i = 0;
        const elem = document.getElementById(elementId);
        elem.innerHTML = "";
        function write() {
            if (i < text.length) {
                elem.innerHTML += text.charAt(i);
                i++;
                chatContainer.scrollTop = chatContainer.scrollHeight;
                setTimeout(write, speed);
            }
        }
        write();
    }

    async function mesajGonder() {
        const text = userInput.value.trim();
        if (!text) return;

        // Kullanıcı mesajını ekle
        ekranaYaz(text, 'user');
        userInput.value = '';
        
        sendBtn.disabled = true;
        statusText.innerText = "PROCESSING DATA";
        statusText.style.color = "#ffaa00";

        // Animasyonlu düşünme kutusu oluştur
        const jarvisGeciciId = 'jarvis-' + Date.now();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message jarvis`;
        msgDiv.innerHTML = `
            <div class="thinking-waves">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
        `;
        msgDiv.id = jarvisGeciciId;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });

            const data = await response.json();
            const targetElement = document.getElementById(jarvisGeciciId);

            if (data.reply) {
                // Düşünme dalgalarını kaldırıp yazma efektiyle cevabı bas
                targetElement.innerHTML = ""; 
                typeWriter(data.reply, jarvisGeciciId);
            } else {
                targetElement.innerText = "Bir protokol hatası oluştu, sistem yanıt vermiyor.";
            }
        } catch (error) {
            document.getElementById(jarvisGeciciId).innerText = "Ana sunucu ağ geçidi bağlantı hatası.";
        } finally {
            sendBtn.disabled = false;
            statusText.innerText = "CORE ONLINE";
            statusText.style.color = "#52a7cc";
        }
    }

    function ekranaYaz(mesaj, kim) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${kim}`;
        msgDiv.innerText = mesaj;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Enter kombinasyonu (Mobil için optimize)
    userInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            mesajGonder();
        }
    });
</script>

</body>
</html>
