<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Süpernova Kalp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #03040f;
    font-family: 'Georgia', serif;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* ─── AÇILIŞ BUTONU ─── */
  #btn-wrap {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Dış ripple halkaları */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 120, 200, 0.55);
    animation: ripple-ring 2.4s ease-out infinite;
    pointer-events: none;
  }
  .ring-1 { width: 120px; height: 120px; animation-delay: 0s; }
  .ring-2 { width: 155px; height: 155px; animation-delay: 0.8s; border-color: rgba(180,100,255,0.35); }
  .ring-3 { width: 192px; height: 192px; animation-delay: 1.6s; border-color: rgba(100,200,255,0.22); }

  @keyframes ripple-ring {
    0%   { opacity: 0.8; transform: scale(0.85); }
    60%  { opacity: 0.3; }
    100% { opacity: 0;   transform: scale(1.25); }
  }

  #btn {
    position: relative;
    width: 86px; height: 86px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,160,220,0.55);
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    line-height: 1;
    box-shadow:
      0 0 18px rgba(255,100,200,0.45),
      0 0 38px rgba(180,80,255,0.3),
      inset 0 0 14px rgba(255,180,230,0.12);
    animation:
      fade-in-scale 1s cubic-bezier(.22,1,.36,1) forwards,
      breathe 3.2s ease-in-out 1s infinite;
    opacity: 0;
    transform: scale(0.7);
    transition: box-shadow 0.25s, filter 0.25s;
    user-select: none;
    -webkit-user-select: none;
  }

  #btn:hover {
    box-shadow:
      0 0 28px rgba(255,120,210,0.75),
      0 0 55px rgba(180,80,255,0.55),
      inset 0 0 20px rgba(255,200,240,0.18);
    filter: brightness(1.25);
  }

  @keyframes fade-in-scale {
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.055); }
  }

  /* ─── MERKEZ YAZI ─── */
  #love-text {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    font-size: clamp(1.1rem, 4vw, 1.9rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    white-space: nowrap;
    background: linear-gradient(90deg,
      #ff6eb0, #c96dff, #ffd166, #6de4ff, #ff6eb0, #c96dff, #ffd166
    );
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none; /* can't combine with bg-clip; use filter instead */
    filter:
      drop-shadow(0 0 6px rgba(255,120,200,0.9))
      drop-shadow(0 0 14px rgba(180,80,255,0.7))
      drop-shadow(0 0 28px rgba(100,200,255,0.5));
    animation: none;
  }

  #love-text.visible {
    animation:
      text-appear 0.7s cubic-bezier(.22,1,.36,1) forwards,
      gradient-shift 5s linear infinite,
      text-pulse 2.6s ease-in-out infinite;
  }

  @keyframes text-appear {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 14px)); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }

  @keyframes gradient-shift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  @keyframes text-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%       { transform: translate(-50%, -50%) scale(1.022); }
  }

  #love-text.glow-boost {
    filter:
      drop-shadow(0 0 10px rgba(255,180,220,1))
      drop-shadow(0 0 22px rgba(200,100,255,0.9))
      drop-shadow(0 0 45px rgba(100,220,255,0.7));
    transition: filter 0.12s ease-out;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="btn-wrap">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div id="btn" role="button" aria-label="Süpernova başlat" tabindex="0">💖</div>
</div>

<div id="love-text">seni seviyorum 💖</div>

<script>
'use strict';

// ════════════════════════════════════════
//  CANVAS & DPR SETUP
// ════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const dpr    = Math.min(window.devicePixelRatio || 1, 2);

let W, H, CX, CY;

function resizeCanvas() {
  W  = window.innerWidth;
  H  = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Rebuild static stars on resize
  buildStaticStars();

  // If heart is visible, recalculate targets
  if (state === STATE.FORMING || state === STATE.HEART_IDLE) {
    assignHeartTargets();
  }
}

window.addEventListener('resize', resizeCanvas);

// ════════════════════════════════════════
//  STATE MACHINE
// ════════════════════════════════════════
const STATE = { IDLE: 0, EXPLODING: 1, FORMING: 2, HEART_IDLE: 3 };
let state       = STATE.IDLE;
let stateTime   = 0;   // ms elapsed in current state
let lastTS      = 0;
let glowPulse   = { active: false, t: 0, cx: 0, cy: 0, duration: 600 }; // KALP PARLAMA

// ════════════════════════════════════════
//  ARKAPLAN — STATIK YILDIZLAR
// ════════════════════════════════════════
const STAR_LAYERS = [
  { count: 140, minR: 0.35, maxR: 0.9,  speed: 0.55 },
  { count: 90,  minR: 0.9,  maxR: 1.6,  speed: 0.85 },
  { count: 45,  minR: 1.6,  maxR: 2.8,  speed: 1.2  },
];

let bgStars = [];

function buildStaticStars() {
  bgStars = [];
  STAR_LAYERS.forEach(layer => {
    for (let i = 0; i < layer.count; i++) {
      bgStars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: layer.minR + Math.random() * (layer.maxR - layer.minR),
        baseAlpha: 0.3 + Math.random() * 0.55,
        alpha: 0,
        phase: Math.random() * Math.PI * 2,
        speed: layer.speed * (0.7 + Math.random() * 0.6),
        shockScale: 1,   // for shockwave effect
      });
    }
  });
}

// ════════════════════════════════════════
//  ARKAPLAN — NEBULALAR
// ════════════════════════════════════════
const nebulae = [
  { cx: 0.18, cy: 0.22, rx: 0.28, ry: 0.20, color: 'rgba(120,40,180,0.055)',  drift: { x: 0.00007, y: 0.00004 }, ox: 0, oy: 0 },
  { cx: 0.75, cy: 0.60, rx: 0.30, ry: 0.22, color: 'rgba(200,60,140,0.045)', drift: { x:-0.00005, y: 0.00006 }, ox: 0, oy: 0 },
  { cx: 0.50, cy: 0.82, rx: 0.35, ry: 0.18, color: 'rgba(60,100,200,0.040)',  drift: { x: 0.00006, y:-0.00005 }, ox: 0, oy: 0 },
];

function drawNebulae(ts) {
  nebulae.forEach(n => {
    n.ox = Math.sin(ts * n.drift.x * 1000) * W * 0.04;
    n.oy = Math.cos(ts * n.drift.y * 1000) * H * 0.03;
    const grd = ctx.createRadialGradient(
      n.cx * W + n.ox, n.cy * H + n.oy, 0,
      n.cx * W + n.ox, n.cy * H + n.oy, Math.max(n.rx * W, n.ry * H)
    );
    grd.addColorStop(0, n.color);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save();
    ctx.scale(1, n.ry / n.rx);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(n.cx * W + n.ox, (n.cy * H + n.oy) * (n.rx / n.ry), n.rx * W, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ════════════════════════════════════════
//  KAYAN YILDIZLAR (Shooting Stars)
// ════════════════════════════════════════
let shootingStars = [];
let nextShootTime = 0;

function spawnShootingStar(now) {
  const angle  = (-0.15 + Math.random() * 0.3) * Math.PI; // mostly horizontal
  const speed  = 600 + Math.random() * 700;
  const sx     = Math.random() * W * 0.5;
  const sy     = Math.random() * H * 0.4;
  shootingStars.push({
    x: sx, y: sy,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed + 60,
    len: 80 + Math.random() * 120,
    alpha: 0,
    life: 0,
    maxLife: 0.9 + Math.random() * 0.5,
  });
  nextShootTime = now + 4000 + Math.random() * 4000;
}

function updateShootingStars(dt, now) {
  if (now >= nextShootTime) spawnShootingStar(now);
  shootingStars = shootingStars.filter(s => s.life < s.maxLife);
  shootingStars.forEach(s => {
    s.life += dt;
    const prog = s.life / s.maxLife;
    s.alpha = prog < 0.2 ? prog / 0.2 : prog > 0.7 ? (1 - prog) / 0.3 : 1;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
  });
}

function drawShootingStars() {
  shootingStars.forEach(s => {
    const grd = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * 0.12, s.y - s.vy * 0.12);
    grd.addColorStop(0, `rgba(255,255,255,${s.alpha * 0.95})`);
    grd.addColorStop(1, `rgba(200,180,255,0)`);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx * 0.13, s.y - s.vy * 0.13);
    ctx.stroke();
  });
}

// ════════════════════════════════════════
//  PARTICLE SYSTEM
// ════════════════════════════════════════
const PARTICLE_COLORS = [
  '#ff6eb0','#ff8fc6','#ff4fa0',   // pembe %30
  '#c96dff','#a855f7','#d48cff',   // mor  %25
  '#ffd166','#ffbb33','#ffe599',   // altın %20
  '#6de4ff','#38cfff','#00e0ff',   // cyan  %15
  '#ffffff','#f0f0ff',              // beyaz %10
];

function randColor() {
  return PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
}

// Hex rengi rgba string'e dönüştür — draw() içinde tekrar tekrar kullanılır
const _hexCache = {};
function hexToRgba(hex, alpha) {
  let rgb = _hexCache[hex];
  if (!rgb) {
    const h = hex.replace('#','');
    const r = parseInt(h.substring(0,2),16);
    const g = parseInt(h.substring(2,4),16);
    const b = parseInt(h.substring(4,6),16);
    rgb = `${r},${g},${b}`;
    _hexCache[hex] = rgb;
  }
  return `rgba(${rgb},${alpha})`;
}

// Mobile performance
const isMobile = /Mobi|Android/i.test(navigator.userAgent);
const PARTICLE_COUNT = isMobile ? 500 : 900;

class Particle {
  constructor() { this.reset(); }

  reset() {
    this.active    = false;
    this.x         = CX; this.y = CY;
    this.vx        = 0;  this.vy = 0;
    this.targetX   = CX; this.targetY = CY;
    this.size      = 2;
    this.baseSize  = 2;
    this.color     = '#fff';
    this.rotation  = 0;
    this.rotSpeed  = 0;
    this.opacity   = 1;
    this.twinklePhase  = Math.random() * Math.PI * 2;
    this.twinkleFreq   = 1.5 + Math.random() * 2.5;
    this.sparkle       = Math.random() < 0.28;
    this.hasTarget     = false;
    this.innerScale    = 1;
    this.glowBoost     = 0;   // 0-1 for touch glow
    this.glowDelay     = 0;   // delay for wave effect
  }

  init(cx, cy, index, total) {
    this.active  = true;
    this.x       = cx; this.y = cy;
    this.color   = randColor();
    this.baseSize = 1.2 + Math.random() * 3.0;
    this.size     = this.baseSize;
    this.rotation = Math.random() * Math.PI * 2;
    // Faster initial spin — slows as particle decelerates
    this.rotSpeed = (Math.random() < 0.5 ? 1 : -1) * (8 + Math.random() * 18);
    this.opacity  = 0.92 + Math.random() * 0.08;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.twinkleFreq  = 1.5 + Math.random() * 2.5;
    this.sparkle      = Math.random() < 0.28;
    this.hasTarget    = false;
    this.glowBoost    = 0;
    this.glowDelay    = 0;

    // PATLAMA — tam 360° uniform dağılım
    const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ~137.5°
    const baseAngle   = index * goldenAngle;
    const jitter      = (Math.random() - 0.5) * 0.55;
    const angle       = baseAngle + jitter;

    // Hız: iç katman yavaş, dış katman hızlı — derinlik hissi
    const speedBand   = Math.random(); // 0-1
    const speed       = 180 + speedBand * 720;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;

    const initSpread = 6;
    this.x = cx + (Math.random() - 0.5) * initSpread;
    this.y = cy + (Math.random() - 0.5) * initSpread;

    // Boyut büyük parçacıklar daha yavaş → doğal derinlik
    this.baseSize = 1.0 + (1 - speedBand) * 2.8 + Math.random() * 0.8;
    this.size     = this.baseSize;
  }

  update(dt, ts) {
    if (!this.active) return;

    if (state === STATE.EXPLODING) {
      const friction = 1 - dt * 1.4;
      this.vx *= Math.max(friction, 0);
      this.vy *= Math.max(friction, 0);
      this.vy += 30 * dt; // hafif yerçekimi
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.rotSpeed *= (1 - dt * 1.1);
      this.rotation += this.rotSpeed * dt;
      this.opacity = Math.max(0, this.opacity - dt * 0.04);

    } else if (state === STATE.FORMING || state === STATE.HEART_IDLE) {
      if (this.hasTarget) {
        const ease  = state === STATE.FORMING ? 0.095 : 0.06;
        const dx    = this.targetX - this.x;
        const dy    = this.targetY - this.y;
        this.x     += dx * ease;
        this.y     += dy * ease;
        this.vx    *= 0.85;
        this.vy    *= 0.85;
        this.rotSpeed *= 0.92;
        this.rotation  += this.rotSpeed * dt;
      }

      // Twinkle
      const tw   = 0.7 + 0.3 * Math.sin(ts * this.twinkleFreq + this.twinklePhase);
      const boost = 1 + this.glowBoost * 1.6;
      this.size  = this.baseSize * tw * boost;

      // Decay glow boost
      if (this.glowBoost > 0) {
        this.glowBoost = Math.max(0, this.glowBoost - dt * 2.2);
      }
    }
  }

  draw(ts) {
    if (!this.active || this.opacity <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    const s         = this.size;
    const glowExtra = this.glowBoost * 12;
    const isExploding = state === STATE.EXPLODING;

    // ── Katman 1: Geniş, yumuşak dış glow ──
    const outerR = s * (isExploding ? 4.5 : 3.2 + glowExtra * 0.4);
    const g1 = ctx.createRadialGradient(0, 0, 0, 0, 0, outerR);
    g1.addColorStop(0,   hexToRgba(this.color, 0.55));
    g1.addColorStop(0.35, hexToRgba(this.color, 0.25));
    g1.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g1;
    ctx.beginPath();
    ctx.arc(0, 0, outerR, 0, Math.PI * 2);
    ctx.fill();

    // ── Katman 2: Orta parlak halka ──
    const midR = s * (isExploding ? 2.0 : 1.6 + glowExtra * 0.2);
    const g2 = ctx.createRadialGradient(0, 0, 0, 0, 0, midR);
    g2.addColorStop(0,   hexToRgba(this.color, 0.90));
    g2.addColorStop(0.5, hexToRgba(this.color, 0.50));
    g2.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.arc(0, 0, midR, 0, Math.PI * 2);
    ctx.fill();

    // ── Katman 3: Parlak beyaz çekirdek ──
    const coreR = s * (isExploding ? 0.70 : 0.55);
    const g3 = ctx.createRadialGradient(0, 0, 0, 0, 0, coreR * 2.2);
    g3.addColorStop(0,   'rgba(255,255,255,1)');
    g3.addColorStop(0.4, hexToRgba(this.color, 0.85));
    g3.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g3;
    ctx.beginPath();
    ctx.arc(0, 0, coreR * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // ── Katman 4: Sparkle ışın çizgileri ──
    if (this.sparkle) {
      const rayCount = isExploding ? 4 : 4;
      const rayLen   = s * (isExploding ? 3.8 : 2.6 + glowExtra * 0.25);
      const rayAlpha = isExploding ? 0.85 : 0.75;
      for (let r = 0; r < rayCount; r++) {
        const rAngle = (r / rayCount) * Math.PI;
        const ex1 =  Math.cos(rAngle) * rayLen;
        const ey1 =  Math.sin(rAngle) * rayLen;
        const ex2 = -Math.cos(rAngle) * rayLen;
        const ey2 = -Math.sin(rAngle) * rayLen;
        const gLine = ctx.createLinearGradient(ex2, ey2, ex1, ey1);
        gLine.addColorStop(0,   hexToRgba(this.color, 0));
        gLine.addColorStop(0.45, hexToRgba(this.color, rayAlpha * 0.6));
        gLine.addColorStop(0.5, 'rgba(255,255,255,' + rayAlpha + ')');
        gLine.addColorStop(0.55, hexToRgba(this.color, rayAlpha * 0.6));
        gLine.addColorStop(1,   hexToRgba(this.color, 0));
        ctx.strokeStyle = gLine;
        ctx.lineWidth   = isExploding ? 0.9 : 0.65;
        ctx.beginPath();
        ctx.moveTo(ex2, ey2);
        ctx.lineTo(ex1, ey1);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
}

// Object pool
const pool      = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
let   particles = [];

function spawnParticles(cx, cy) {
  particles = [];
  const total = pool.length;
  pool.forEach((p, i) => { p.reset(); p.init(cx, cy, i, total); particles.push(p); });
}

// ════════════════════════════════════════
//  KALP HEDEF HESAPLAMA
// ════════════════════════════════════════
function heartPoint(t) {
  const x =  16 * Math.pow(Math.sin(t), 3);
  const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

function assignHeartTargets() {
  const scale = Math.min(W, H) * (isMobile ? 0.026 : 0.028);
  particles.forEach((p, i) => {
    const t      = (i / particles.length) * Math.PI * 2;
    const inner  = Math.random() < 0.42 ? 0.55 + Math.random() * 0.44 : 1.0;
    const pt     = heartPoint(t);
    p.targetX    = CX + pt.x * scale * inner;
    p.targetY    = CY + pt.y * scale * inner;
    p.hasTarget  = true;

    const dist   = Math.hypot(p.targetX - CX, p.targetY - CY);
    p.glowDelay  = dist / 300;
  });
}

// ════════════════════════════════════════
//  SHOCKWAVE RINGS
// ════════════════════════════════════════
let shockwaves = [];

function spawnShockwaves(cx, cy) {
  shockwaves = [
    { cx, cy, r: 2, maxR: Math.max(W, H) * 0.72, alpha: 1.0, color: 'rgba(255,210,245,', speed: 1100 },
    { cx, cy, r: 2, maxR: Math.max(W, H) * 0.50, alpha: 0.85, color: 'rgba(180,100,255,', speed: 820, delay: 0.12 },
    { cx, cy, r: 2, maxR: Math.max(W, H) * 0.35, alpha: 0.65, color: 'rgba(100,210,255,', speed: 600, delay: 0.26 },
  ];
}

let shockTimer = 0;
function updateShockwaves(dt) {
  shockTimer += dt;
  shockwaves.forEach(sw => {
    if (sw.delay && shockTimer < sw.delay) return;
    sw.r     += dt * sw.speed;
    const pr  = sw.r / sw.maxR;
    sw.alpha  = Math.max(0, (1 - pr) * (sw === shockwaves[0] ? 0.9 : 0.7));
  });
  shockwaves = shockwaves.filter(sw => sw.alpha > 0);
}

function drawShockwaves() {
  shockwaves.forEach((sw, idx) => {
    if (!sw.alpha) return;
    ctx.save();
    const lw = idx === 0 ? 3.5 : idx === 1 ? 2.2 : 1.5;
    ctx.strokeStyle = sw.color + sw.alpha + ')';
    ctx.lineWidth   = lw;
    ctx.shadowColor = sw.color + Math.min(sw.alpha * 0.9, 0.8) + ')';
    ctx.shadowBlur  = idx === 0 ? 22 : 14;
    ctx.globalCompositeOperation = 'lighter';
    ctx.beginPath();
    ctx.arc(sw.cx, sw.cy, Math.max(sw.r, 1), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });
}

// ════════════════════════════════════════
//  EKRAN FLASH
// ════════════════════════════════════════
let flashAlpha = 0;

function triggerFlash() { flashAlpha = 1.0; }

function updateFlash(dt) {
  const decayRate = flashAlpha > 0.5 ? 9.0 : 4.0;
  flashAlpha = Math.max(0, flashAlpha - dt * decayRate);
}

function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = flashAlpha;
  ctx.fillStyle   = '#ffccee';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ════════════════════════════════════════
//  ARKAPLAN YILDIZ ŞOK DALGASI
// ════════════════════════════════════════
let bgShock = 0;

function triggerBgShock() { bgShock = 1; }

function updateBgShock(dt) {
  bgShock = Math.max(0, bgShock - dt * 2.8);
}

// ════════════════════════════════════════
//  KALP GENEL NABIZ (Heart breathing)
// ════════════════════════════════════════
let heartPulseScale = 1;
let heartPulseRot   = 0;

// ════════════════════════════════════════
//  KALP PARLAMA ETKİLEŞİMİ
// ════════════════════════════════════════
function triggerHeartGlow(ex, ey, strong) {
  if (state !== STATE.HEART_IDLE) return;
  const intensity = strong ? 1.0 : 0.42;
  glowPulse.active   = true;
  glowPulse.t        = 0;
  glowPulse.cx       = ex;
  glowPulse.cy       = ey;
  glowPulse.duration = strong ? 620 : 380;
  glowPulse.intensity = intensity;

  particles.forEach(p => {
    const dist  = Math.hypot(p.targetX - ex, p.targetY - ey);
    const delay = dist / 480;
    setTimeout(() => {
      if (!p.active) return;
      p.glowBoost = Math.min(1, p.glowBoost + intensity * (0.7 + Math.random() * 0.3));
    }, delay * 1000);
  });

  const txt = document.getElementById('love-text');
  txt.classList.add('glow-boost');
  setTimeout(() => txt.classList.remove('glow-boost'), glowPulse.duration + 200);
}

function updateGlowPulse(dt) {
  if (!glowPulse.active) return;
  glowPulse.t += dt * 1000;
  if (glowPulse.t >= glowPulse.duration) {
    glowPulse.active = false;
  }
}

function drawHeartHalo(ts) {
  if (state !== STATE.HEART_IDLE && state !== STATE.FORMING) return;
  const prog    = state === STATE.FORMING ? Math.min(stateTime / 1500, 1) : 1;
  const gPulse  = glowPulse.active ? 0.4 * (1 - glowPulse.t / glowPulse.duration) : 0;
  const r       = Math.min(W, H) * 0.26 * heartPulseScale;
  const alpha   = (0.18 + gPulse) * prog;
  const grd     = ctx.createRadialGradient(CX, CY, 0, CX, CY, r);
  grd.addColorStop(0, `rgba(255,100,200,${alpha * 0.9})`);
  grd.addColorStop(0.4, `rgba(180,60,255,${alpha * 0.6})`);
  grd.addColorStop(0.7, `rgba(100,200,255,${alpha * 0.28})`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ════════════════════════════════════════
//  BUTTON EXPLOSION ANIMATION
// ════════════════════════════════════════
let btnExploding = false;
let btnEl        = document.getElementById('btn-wrap');
let btnCore      = document.getElementById('btn');

function explodeButton() {
  btnCore.style.transition   = 'transform 0.12s ease-in, opacity 0.3s ease-in';
  btnCore.style.transform    = 'scale(3.5)';
  btnCore.style.opacity      = '0';
  btnEl.style.pointerEvents  = 'none';
  setTimeout(() => { btnEl.style.display = 'none'; }, 340);
}

// ════════════════════════════════════════
//  TEXT REVEAL
// ════════════════════════════════════════
let textRevealed = false;
function revealText() {
  if (textRevealed) return;
  textRevealed = true;
  const txt = document.getElementById('love-text');
  txt.classList.add('visible');
}

// ════════════════════════════════════════
//  MAIN RENDER LOOP
// ════════════════════════════════════════
function render(ts) {
  const dt  = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS     = ts;
  stateTime += dt * 1000;

  ctx.fillStyle = '#03040f';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  drawNebulae(ts / 1000);
  ctx.restore();

  const shockBrightness = bgShock;
  bgStars.forEach(s => {
    const tw  = 0.5 + 0.5 * Math.sin(ts / 1000 * s.speed + s.phase);
    s.alpha   = s.baseAlpha * (0.6 + 0.4 * tw) * (1 + shockBrightness * 1.5);
    ctx.save();
    ctx.globalAlpha = Math.min(s.alpha, 1);
    const r   = s.r * (1 + shockBrightness * 0.5);
    const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 2.5);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.4, 'rgba(200,180,255,0.6)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  updateShootingStars(dt, ts);
  drawShootingStars();

  drawHeartHalo(ts);

  const hps = 1 + 0.03 * Math.sin(ts / 1000 * 0.42);
  heartPulseScale = hps;
  heartPulseRot   = Math.sin(ts / 1000 * 0.28) * (Math.PI / 90);

  if (state === STATE.HEART_IDLE || state === STATE.FORMING) {
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(heartPulseRot);
    ctx.scale(hps, hps);
    ctx.translate(-CX, -CY);
    ctx.globalCompositeOperation = 'lighter';
    particles.forEach(p => { p.update(dt, ts / 1000); p.draw(ts / 1000); });
    ctx.restore();
  } else {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    particles.forEach(p => { p.update(dt, ts / 1000); p.draw(ts / 1000); });
    ctx.restore();
  }

  updateShockwaves(dt);
  drawShockwaves();

  updateFlash(dt);
  drawFlash();

  updateBgShock(dt);

  updateGlowPulse(dt);

  if (state === STATE.EXPLODING && stateTime > 900) {
    state     = STATE.FORMING;
    stateTime = 0;
    particles.forEach(p => { if (p.active) p.opacity = 0.95; });
    assignHeartTargets();
  }

  if (state === STATE.FORMING && stateTime > 1800) {
    state     = STATE.HEART_IDLE;
    stateTime = 0;
    setTimeout(revealText, 350);
  }

  requestAnimationFrame(render);
}

// ════════════════════════════════════════
//  HIT TEST — Heart Area
// ════════════════════════════════════════
function isNearHeart(ex, ey) {
  const hitR = Math.min(W, H) * 0.24;
  return Math.hypot(ex - CX, ey - CY) < hitR;
}

// ════════════════════════════════════════
//  LAUNCH SEQUENCE
// ════════════════════════════════════════
function launch(evt) {
  if (state !== STATE.IDLE) return;
  const ex = evt.changedTouches ? evt.changedTouches[0].clientX : evt.clientX || CX;
  const ey = evt.changedTouches ? evt.changedTouches[0].clientY : evt.clientY || CY;

  state     = STATE.EXPLODING;
  stateTime = 0;
  shockTimer = 0;

  explodeButton();
  triggerFlash();
  triggerBgShock();
  spawnShockwaves(CX, CY);
  spawnParticles(CX, CY);
}

// Button events
const btnEl2 = document.getElementById('btn');
btnEl2.addEventListener('click',      launch);
btnEl2.addEventListener('touchstart', (e) => { e.preventDefault(); launch(e); }, { passive: false });
btnEl2.addEventListener('keydown',    (e) => { if (e.key === 'Enter' || e.key === ' ') launch(e); });

// Heart glow — canvas clicks/touches
canvas.addEventListener('click', (e) => {
  if (state !== STATE.HEART_IDLE) return;
  const ex = e.clientX, ey = e.clientY;
  if (isNearHeart(ex, ey)) triggerHeartGlow(ex, ey, true);
});

canvas.addEventListener('touchstart', (e) => {
  if (state !== STATE.HEART_IDLE) return;
  e.preventDefault();
  const t  = e.changedTouches[0];
  const ex = t.clientX, ey = t.clientY;
  if (isNearHeart(ex, ey)) triggerHeartGlow(ex, ey, true);
}, { passive: false });

canvas.addEventListener('mousemove', (e) => {
  if (state !== STATE.HEART_IDLE) return;
  const ex = e.clientX, ey = e.clientY;
  if (!canvas._hoverThrottle) {
    canvas._hoverThrottle = true;
    if (isNearHeart(ex, ey)) triggerHeartGlow(ex, ey, false);
    setTimeout(() => { canvas._hoverThrottle = false; }, 600);
  }
});

// ════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════
resizeCanvas();
nextShootTime = performance.now() + 1200;
requestAnimationFrame(render);
</script>
</body>
